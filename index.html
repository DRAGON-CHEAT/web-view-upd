<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        
        /* جعل البوكسات بجانب بعضها ومسافة مناسبة */
        .app-container { display: flex; flex-direction: row; gap: 40px; justify-content: center; padding: 20px; flex-wrap: nowrap; }
        
        /* تصغير حجم البوكس قليلاً */
        .box { background: #1e1e1e; border: 3px solid #333; border-radius: 20px; padding: 20px; width: 220px; text-align: center; transition: 0.3s; }
        
        .box:focus, .box:focus-within { border-color: #007bff; transform: scale(1.05); outline: none; box-shadow: 0 0 20px rgba(0, 123, 255, 0.4); }
        h2 { color: #007bff; margin: 0 0 15px 0; font-size: 18px; }
        .btn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 10px; font-size: 16px; cursor: pointer; margin: 8px 0; width: 100%; font-weight: bold; }
        .btn-clean { background: #444; font-size: 14px; }
        .btn:focus { background: #0056b3; outline: 2px solid white; }
        .progress-container { width: 100%; background: #333; height: 12px; border-radius: 6px; margin-top: 15px; display: none; overflow: hidden; position: relative; }
        .progress-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #007bff, #00d4ff, #007bff); background-size: 200% 100%; animation: move 1.5s linear infinite; }
        @keyframes move { from { background-position: 200% 0; } to { background-position: -200% 0; } }
    </style>
</head>
<body>

    <h1 style="margin-bottom: 20px; border-bottom: 2px solid #007bff;">DRAGON TV STORE</h1>

    <div class="app-container">
        <!-- البوكس الأول -->
        <div class="box" tabindex="0">
            <h2>Dragon TV App 1</h2>
            <button class="btn" onclick="startAction(this, 'https://github.com/DRAGON-CHEAT/DragonTv/releases/download/1.2.0/com.magdalm.apkextractor_10.6.1-1061_minAPI17.nodpi._apkmirror.com.apk')">تحميل التطبيق</button>
            <button class="btn btn-clean" onclick="window.Android.deleteOldApk()">تنظيف الملفات</button>
            <div class="progress-container"><div class="progress-bar"></div></div>
        </div>

        <!-- البوكس الثاني -->
        <div class="box" tabindex="0">
            <h2>Dragon TV App 2</h2>
            <button class="btn" onclick="startAction(this, 'https://github.com/DRAGON-CHEAT/DragonTv/releases/download/1.2.0/com.magdalm.apkextractor_10.6.1-1061_minAPI17.nodpi._apkmirror.com.apk')">تحميل التطبيق</button>
            <button class="btn btn-clean" onclick="window.Android.deleteOldApk()">تنظيف الملفات</button>
            <div class="progress-container"><div class="progress-bar"></div></div>
        </div>
    </div>

    <script>
        function startAction(btnElement, url) {
            // البحث عن حاوية التحميل داخل البوكس الذي تم ضغط زره فقط
            var parentBox = btnElement.parentElement;
            var progressCont = parentBox.querySelector('.progress-container');
            
            if(progressCont) progressCont.style.display = 'block';
            btnElement.innerText = "جاري التحميل...";
            
            if(window.Android) {
                window.Android.triggerDownload(url);
            }
        }
    </script>
</body>
</html>
