<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; border: 3px solid #333; border-radius: 20px; padding: 30px; width: 85%; max-width: 400px; text-align: center; }
        .card:focus, button:focus { border-color: #007bff; outline: none; transform: scale(1.05); }
        .btn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 10px; font-size: 18px; cursor: pointer; margin: 10px; width: 100%; font-weight: bold; }
        .btn-install { background: #28a745; display: none; }
        .btn-clean { background: #6c757d; display: none; font-size: 14px; }
        .progress-container { width: 100%; background: #333; height: 16px; border-radius: 8px; margin: 20px 0; display: none; overflow: hidden; }
        .progress-bar { 
            width: 100%; height: 100%; 
            background: linear-gradient(45deg, rgba(255,255,255,.15) 25%, transparent 25%, transparent 50%, rgba(255,255,255,.15) 50%, rgba(255,255,255,.15) 75%, transparent 75%, transparent) #007bff;
            background-size: 40px 40px; animation: move-stripes 1s linear infinite; 
        }
        @keyframes move-stripes { from { background-position: 40px 0; } to { background-position: 0 0; } }
    </style>
</head>
<body>
    <div class="card" tabindex="0">
        <h2>Dragon Apps</h2>
        <button class="btn" id="dl-btn" onclick="startDL()">تحميل الآن</button>
        <div class="progress-container" id="p-cont"><div class="progress-bar"></div></div>
        <button class="btn btn-install" id="ins-btn" onclick="window.Android.installApk()">تثبيت الآن</button>
        <button class="btn btn-clean" id="clean-btn" onclick="window.Android.deleteOldApk()">تنظيف</button>
        <p id="status" style="color:#aaa;">جاهز</p>
    </div>
    <script>
        function startDL() {
            document.getElementById('dl-btn').style.display = 'none';
            document.getElementById('p-cont').style.display = 'block';
            document.getElementById('status').innerText = "جاري التحميل في الخلفية...";
            window.location.href = "https://github.com/DRAGON-CHEAT/DragonTv/releases/download/1.2.0/com.magdalm.apkextractor_10.6.1-1061_minAPI17.nodpi._apkmirror.com.apk"; 
            setTimeout(() => {
                document.getElementById('p-cont').style.display = 'none';
                document.getElementById('ins-btn').style.display = 'block';
                document.getElementById('clean-btn').style.display = 'block';
                document.getElementById('status').innerText = "اكتمل التحميل";
            }, 12000);
        }
    </script>
</body>
</html>
