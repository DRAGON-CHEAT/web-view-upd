<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Apps Store</title>
    <style>
        body { background-color: #121212; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { background: #1e1e1e; border: 3px solid #333; border-radius: 20px; padding: 30px; width: 85%; max-width: 500px; text-align: center; transition: 0.3s; }
        
        /* تأثير التركيز للريموت كنترول */
        .card:focus, button:focus { border-color: #007bff; background: #252525; outline: none; transform: scale(1.03); box-shadow: 0 0 15px rgba(0, 123, 255, 0.5); }
        
        h1 { font-size: 24px; margin-bottom: 20px; color: #007bff; }
        .btn { background: #007bff; color: white; border: none; padding: 12px 30px; border-radius: 10px; font-size: 18px; cursor: pointer; margin: 10px; width: 200px; display: inline-block; font-weight: bold; }
        .btn-delete { background: #dc3545; display: none; }
        .btn-install { background: #28a745; display: none; }

        .progress-container { width: 100%; background: #333; height: 15px; border-radius: 10px; margin: 20px 0; display: none; position: relative; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #007bff, #00d4ff); border-radius: 10px; transition: width 0.2s; }
        
        #status-text { font-size: 14px; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card" tabindex="0" id="main-card">
        <h1 id="title">Dragon Apps</h1>
        
        <!-- زر التحميل الأساسي -->
        <button class="btn" id="dl-btn" onclick="startDownload()">تحميل الآن</button>
        
        <!-- أزرار التثبيت والحذف (تظهر لاحقاً) -->
        <button class="btn btn-install" id="ins-btn" onclick="installAction()">تثبيت التطبيق</button>
        <button class="btn btn-delete" id="del-btn" onclick="deleteAction()">حذف الملف</button>

        <div class="progress-container" id="p-cont">
            <div class="progress-bar" id="p-bar"></div>
        </div>
        
        <p id="status-text">جاهز للتحميل</p>
    </div>

    <script>
        const apkUrl = "https://github.com/DRAGON-CHEAT/DragonTv/releases/download/1.2.0/com.magdalm.apkextractor_10.6.1-1061_minAPI17.nodpi._apkmirror.com.apk";

        function startDownload() {
            // إخفاء زر التحميل وإظهار الشريط
            document.getElementById('dl-btn').style.display = 'none';
            document.getElementById('p-cont').style.display = 'block';
            document.getElementById('status-text').innerText = "جاري التحميل... يرجى الانتظار";

            // بدء التحميل الفعلي عبر المتصفح/التطبيق
            window.location.href = apkUrl;

            // محاكاة شريط التحميل
            let width = 0;
            let bar = document.getElementById('p-bar');
            let interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    showInstallStep();
                } else {
                    width++;
                    bar.style.width = width + '%';
                }
            }, 150); // سرعة العداد (حوالي 15 ثانية للوصول لـ 100%)
        }

        function showInstallStep() {
            document.getElementById('p-cont').style.display = 'none';
            document.getElementById('status-text').innerText = "اكتمل التحميل بنجاح";
            document.getElementById('ins-btn').style.display = 'inline-block';
            document.getElementById('del-btn').style.display = 'inline-block';
            // نقل التركيز لزر التثبيت للريموت
            document.getElementById('ins-btn').focus();
        }

        function installAction() {
            // إعادة توجيه للرابط لبدء التثبيت من مدير الملفات
            window.location.href = apkUrl;
        }

        function deleteAction() {
            // هذه الميثود برمجية، سنكتفي هنا بتصفير الواجهة
            alert("سيتم حذف ملف الـ APK من مجلد التحميلات");
            location.reload(); 
        }

        // دعم التنقل بالريموت كنترول للأزرار
        document.addEventListener('keydown', function(e) {
            const focusable = document.querySelectorAll('button, [tabindex="0"]');
            let index = Array.from(focusable).indexOf(document.activeElement);

            if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
                index = (index + 1) % focusable.length;
                focusable[index].focus();
            } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                index = (index - 1 + focusable.length) % focusable.length;
                focusable[index].focus();
            }
        });
    </script>
</body>
</html>
