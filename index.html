<div class="card" tabindex="0">
    <h2 id="app-title">Dragon Apps</h2>
    <button class="btn" id="main-btn" onclick="handleAction()">تحميل التطبيق</button>
    
    <div class="progress-container" id="p-cont">
        <div class="progress-bar" id="p-bar"></div>
    </div>
    <p id="status-text" style="font-size: 12px; color: #aaa;"></p>
</div>

<script>
    function startProcess() {
    document.getElementById('p-cont').style.display = 'block';
    let width = 0;
    let interval = setInterval(() => {
        if (width >= 95) { // يتوقف عند 95% حتى يكتمل التحميل الفعلي
            clearInterval(interval);
        } else {
            width++;
            document.getElementById('p-bar').style.width = width + '%';
        }
    }, 200); // سرعة الشريط
    window.location.href = "https://github.com/DRAGON-CHEAT/DragonTv/releases/download/1.2.0/com.magdalm.apkextractor_10.6.1-1061_minAPI17.nodpi._apkmirror.com.apk"; 
    // بعد فترة يظهر زر التثبيت
    setTimeout(() => {
        document.getElementById('p-bar').style.width = '100%';
        document.getElementById('main-btn').innerText = "تثبيت";
    }, 10000);
}

</script>
