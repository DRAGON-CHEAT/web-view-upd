<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Apps Store</title>
    <style>
        body { background-color: #121212; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { background: #1e1e1e; border: 3px solid #333; border-radius: 20px; padding: 30px; width: 85%; max-width: 450px; text-align: center; transition: 0.3s; }
        
        /* تأثير التركيز للريموت كنترول */
        .card:focus, button:focus { border-color: #007bff; background: #252525; outline: none; transform: scale(1.03); box-shadow: 0 0 15px rgba(0, 123, 255, 0.5); }
        
        h1 { font-size: 24px; margin-bottom: 20px; color: #007bff; }
        .btn { background: #007bff; color: white; border: none; padding: 12px 30px; border-radius: 10px; font-size: 18px; cursor: pointer; margin: 10px; width: 200px; font-weight: bold; display: inline-block; }
        .btn-install { background: #28a745; display: none; }
        .btn-delete { background: #dc3545; display: none; margin-top: 5px; width: 150px; font-size: 14px; }

        /* شريط التحميل المخطط والمتناوب */
        .progress-container { width: 100%; background: #333; height: 16px; border-radius: 8px; margin: 20px 0; display: none; position: relative; overflow: hidden; border: 1px solid #444; }
        .progress-bar { 
            width: 100%; height: 100%; 
            background-image: linear-gradient(45deg, rgba(255,255,255,.15) 25%, transparent 25%, transparent 50%, rgba(255,255,255,.15) 50%, rgba(255,255,255,.15) 75%, transparent 75%, transparent);
            background-size: 40px 40px;
            background-color: #007bff;
            animation: move-stripes 1s linear infinite; 
        }

        @keyframes move-stripes {
            from { background-position: 40px 0; }
            to { background-position: 0 0; }
        }
        
        #status-text { font-size: 14px; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card" tabindex="0" id="main-card">
        <h1 id="title">Dragon Apps</h1>
        
        <button class="btn" id="dl-btn" onclick="startDownload()">تحميل الآن</button>
        
        <div class="progress-container" id="p-cont">
            <div class="progress-bar"></div>
        </div>

        <button class="btn btn-install" id="ins-btn" onclick="installAction()">تثبيت الآن</button>
        <br>
        <button class="btn btn-delete" id="del-btn" onclick="deleteAction()">حذف ملف APK</button>
        
        <p id="status-text">جاهز للتحميل المباشر</p>
    </div>

    <script>
        const apkUrl = "https://github.com/DRAGON-CHEAT/DragonTv/releases/download/1.2.0/com.magdalm.apkextractor_10.6.1-1061_minAPI17.nodpi._apkmirror.com.apk";

        function startDownload() {
            document.getElementById('dl-btn').style.display = 'none';
            document.getElementById('p-cont').style.display = 'block';
            document.getElementById('status-text').innerText = "جاري التحميل داخل التطبيق...";

            // بدء التحميل (سيعالجه الـ DownloadListener في السمالي)
            window.location.href = apkUrl;

            // محاكاة وقت التحميل قبل إظهار زر التثبيت
            setTimeout(() => {
                showInstallStep();
            }, 12000); // 12 ثانية وقت تقريبي
        }

        function showInstallStep() {
            document.getElementById('p-cont').style.display = 'none';
            document.getElementById('status-text').innerText = "تم التحميل بنجاح";
            document.getElementById('ins-btn').style.display = 'inline-block';
            document.getElementById('del-btn').style.display = 'inline-block';
            document.getElementById('ins-btn').focus();
        }

        function installAction() {
            window.location.href = apkUrl;
        }

        function deleteAction() {
            alert("تم إرسال طلب حذف الملف");
            location.reload(); 
        }

        // تحسين التنقل بالريموت (D-Pad)
        document.addEventListener('keydown', function(e) {
            const focusable = document.querySelectorAll('button, [tabindex="0"]');
            let index = Array.from(focusable).indexOf(document.activeElement);

            if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
                index = (index + 1) % focusable.length;
                focusable[index].focus();
            } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                index = (index - 1 + focusable.length) % focusable.length;
                focusable[index].focus();
            }
        });
    </script>
</body>
</html>
